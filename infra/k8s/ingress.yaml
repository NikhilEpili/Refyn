apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: refyn-ai-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.refyn.ai
    secretName: refyn-tls-secret
  rules:
  - host: api.refyn.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: refyn-ai-service
            port:
              number: 80
