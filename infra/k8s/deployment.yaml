apiVersion: apps/v1
kind: Deployment
metadata:
  name: refyn-ai
  labels:
    app: refyn-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: refyn-ai
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: refyn-ai
    spec:
      containers:
      - name: refyn-app
        image: ghcr.io/org/refyn-ai:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: refyn-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
